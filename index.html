<script>fetch("https://docs.google.com/spreadsheets/d/1VYwH1F6EC7T2jPprf-FNaLclORNMMMyfGmE-XF4Mvg4/gviz/tq?tqx=out:json")
  .then(response => response.text())
  .then(data => {const json = JSON.parse(data.substr(47).slice(0,-2));
let html = "";
json.table.rows.sort(function(a,b){return new Date(a.c[2].v)-new Date(b.c[2].v);});
json.table.rows.forEach(function(row){
const deadline =new Date(String(row.c[2].v));
const month =deadline.getMonth()+1;
const day =deadline.getDate();
const hour =deadline.getHours();
const minute =String(deadline.getMinutes()).padStart(2,"0");
const now = new Date();
const diff =deadline - now;
const hours =Math.floor(diff / 1000 / 60 / 60);
const minutes =Math.floor(diff / 1000 / 60) % 60;
const percent =Math.floor(row.c[5].v/row.c[4].v*100);
const id = row.c[6].v;const today =new Date().toLocaleDateString();const storageKey =id + "_" + today;let count =localStorage.getItem(storageKey) || 0;

let warningClass = "";if(hours <= 11){warningClass = "warning";}

html += `
 <div class="card">
  <p class="count">[ТюгТЌЦ ${count}тЏъ тЈѓтіаТИѕсЂ┐]</p>
 <div class="time ${warningClass}">сЂѓсЂе ${hours}ТЎѓжќЊ ${minutes}тѕє</div>
 <div class="percent"><div class="bar"style="width:${percent}%;"></div><span>${percent}%</span></div>
 <p>[${row.c[0].v}]</p>
 <p>та▒жЁг№╝џ${row.c[1].v}­ЪњЎ</p>
<p>${month}/${day} ${hour}:${minute} сЂЙсЂД</p>
<p>${row.c[5].v}/${row.c[4].v}</p>
 <a class="button"href="${row.c[3].v}"target="_blank"rel="noopener noreferrer"onclick="addCount('${storageKey}')">тЈѓтіасЂЎсѓІ</a>
</div> `;});
document.getElementById("cards").innerHTML = html;});
function addCount(key){let count =localStorage.getItem(key) || 0;count++;localStorage.setItem(key, count);}
</script>
